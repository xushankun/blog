baseURL = "https://shankun.top/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "我是文盲我怕谁K"
theme = "PaperMod"
hasCJKLanguage = true

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
enableInlineShortcodes = true

pagination.pagerSize = 10

[permalinks]
  posts = "/:year/:month/:day/:slug/"

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "我是文盲我怕谁K"
  description = "web前端开发"
  keywords = ["前端", "JavaScript", "Vue", "Hexo", "Hugo"]
  author = "Xu Shan Kun"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.giscus]
    repo = "xushankun/hexoBlog"
    repoId = ""              # 在 https://giscus.app 启用后填入
    category = "Comments"    # 在 Discussions 创建同名 category
    categoryId = ""          # 在 https://giscus.app 启用后填入
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "zh-CN"
    loading = "lazy"
    crossorigin = "anonymous"

  [params.homeInfoParams]
    Title = "Hi there \U0001F44B"
    Content = "欢迎来到我的博客 — 一名前端开发工程师的技术与生活记录"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xushankun"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.assets]
    disableHLJS = false
    favicon = "/favicon.ico"

  [params.label]
    text = "shankun.top"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20

  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 30

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 60

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2
