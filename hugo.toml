baseURL = "https://shankun.top/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "我是文盲我怕谁K"
theme = "PaperMod"
hasCJKLanguage = true

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
enableInlineShortcodes = true

pagination.pagerSize = 10

[permalinks]
  posts = "/:year/:month/:day/:slug/"

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "我是文盲我怕谁K"
  description = "记录 A 股每日复盘、AI 行业要闻、前端工程与服务器运维心得 — 资深前端架构师 xushankun 的独立技术博客。"
  keywords = ["A股日报", "AI日报", "前端开发", "Vue", "Hugo", "PaperMod", "服务器运维", "技术博客", "shankun"]
  images = ["/og-image.png"]
  author = "Xu Shan Kun"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

# giscus 评论配置 — 取消下方注释并填入 repoId / categoryId 即可启用
# 启用步骤:
#   1. 打开 https://giscus.app
#   2. 填入仓库名 xushankun/blog
#   3. 页面会自动生成 repo / repoId / categoryId，复制填入下方
#   4. 确保仓库 Settings → Features → Discussions 已勾选
#  [params.giscus]
#    repo = "xushankun/blog"
#    repoId = ""
#    category = "Announcements"
#    categoryId = ""
#    mapping = "pathname"
#    strict = "0"
#    reactionsEnabled = "1"
#    emitMetadata = "0"
#    inputPosition = "bottom"
#    theme = "preferred_color_scheme"
#    lang = "zh-CN"
#    loading = "lazy"
#    crossorigin = "anonymous"

  [params.homeInfoParams]
    Title = "Hi there 👋 我是 Shankun"
    Content = """
前端工程师 / 工具控 / 文学爱好者 / 业余 quant

这里记录我的技术笔记、AI 行业观察、A 股市场跟踪，以及偶尔的诗与思考。

[👉 浏览全部文章](/posts/) · [🗂 按分类查看](/categories/) · [🔍 站内搜索](/search/) · [👤 关于我](/about/)
"""

  [[params.socialIcons]]
    name = "github"
    title = "GitHub"
    url = "https://github.com/xushankun"

  [[params.socialIcons]]
    name = "rss"
    title = "RSS 订阅"
    url = "/index.xml"

  [[params.socialIcons]]
    name = "email"
    title = "Email"
    url = "mailto:xushankun@foxmail.com"

  [params.assets]
    disableHLJS = false
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"
    safari_pinned_tab = "/safari-pinned-tab.svg"
    theme_color = "#6366f1"

  [params.label]
    text = "shankun.top"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "tags"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20

  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 30

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 60

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2
