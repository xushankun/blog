{{- /* 微信二维码弹窗 */}}
<div id="wechatQrModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;"
    onclick="if(event.target===this)this.style.display='none'" role="dialog" aria-label="微信分享二维码">
    <div style="background:var(--theme); border-radius:16px; padding:28px 24px 20px;
        text-align:center; position:relative; min-width:260px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <button onclick="document.getElementById('wechatQrModal').style.display='none'"
            style="position:absolute; top:8px; right:14px; background:none; border:none;
            font-size:22px; cursor:pointer; color:var(--secondary); padding:4px 8px; line-height:1;"
            aria-label="关闭">&times;</button>
        <p style="margin:0 0 16px 0; font-size:14px; color:var(--secondary);">微信扫一扫 分享文章</p>
        <img id="wechatQrImage" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data={{ $pageurl }}" 
            alt="微信分享二维码" width="200" height="200" 
            style="display:block; margin:0 auto; border-radius:8px;"
            onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22 rx=%228%22/><text x=%22100%22 y=%22100%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22 fill=%22%23999%22>QR 加载失败</text></svg>'">
        <p style="margin:12px 0 0 0; font-size:13px; color:var(--secondary); word-break:break-all;">{{ $pageurl }}</p>
    </div>
</div>

{{- /* 复制链接 + 文本分享 JS */}}
<script>
(function() {
    window.copyToClipboard = function(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                showToast("链接已复制");
            }).catch(function() {
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    };

    function fallbackCopy(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.cssText = "position:fixed;left:-9999px;top:-9999px";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); showToast("链接已复制"); }
        catch(e) { prompt("请手动复制链接:", text); }
        document.body.removeChild(ta);
    }

    function showToast(msg) {
        var t = document.createElement("div");
        t.textContent = msg;
        t.style.cssText = "position:fixed;bottom:30px;left:50%;transform:translateX(-50%);"
            + "background:var(--content);color:var(--theme);padding:10px 24px;"
            + "border-radius:20px;font-size:14px;z-index:10000;"
            + "box-shadow:0 4px 16px rgba(0,0,0,0.15);opacity:0;transition:opacity 0.3s;";
        document.body.appendChild(t);
        requestAnimationFrame(function() { t.style.opacity = "1"; });
        setTimeout(function() {
            t.style.opacity = "0";
            setTimeout(function() { document.body.removeChild(t); }, 300);
        }, 1800);
    }

    var shareBtn = document.getElementById("btn-text-share");
    if (shareBtn) {
        shareBtn.addEventListener("click", function(e) {
            e.preventDefault();
            var url = "{{ $pageurl }}";
            var title = "{{ $title }}";
            if (navigator.share) {
                navigator.share({ title: title, url: url }).catch(function(){});
            } else {
                copyToClipboard(title + " - " + url);
            }
        });
        shareBtn.removeAttribute("onclick");
    }
})();
</script>
